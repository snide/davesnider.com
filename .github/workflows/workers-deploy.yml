name: Deploy Workers

on:
  push:
    branches:
      - main
    paths:
      - 'workers/activity-bgg/**'
      - 'workers/activity-bluesky/**'
      - 'workers/activity-github/**'
      - 'workers/activity-hackernews/**'
      - 'workers/activity-steam/**'
  workflow_dispatch: # Manual trigger

jobs:
  deploy-bgg:
    name: Deploy BGG Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/activity-bgg
          secrets: |
            BGG_API_TOKEN
            ACTIVITY_INGEST_TOKEN
        env:
          BGG_API_TOKEN: ${{ secrets.BGG_API_TOKEN }}
          ACTIVITY_INGEST_TOKEN: ${{ secrets.ACTIVITY_INGEST_TOKEN }}

  deploy-bluesky:
    name: Deploy Bluesky Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/activity-bluesky
          secrets: |
            BLUESKY_HANDLE
            ACTIVITY_INGEST_TOKEN
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          ACTIVITY_INGEST_TOKEN: ${{ secrets.ACTIVITY_INGEST_TOKEN }}

  deploy-github:
    name: Deploy GitHub Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/activity-github
          secrets: |
            GITHUB_USERNAME
            GITHUB_TOKEN
            ACTIVITY_INGEST_TOKEN
        env:
          GITHUB_USERNAME: ${{ secrets.GH_ACTIVITY_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.GH_ACTIVITY_TOKEN }}
          ACTIVITY_INGEST_TOKEN: ${{ secrets.ACTIVITY_INGEST_TOKEN }}

  deploy-hackernews:
    name: Deploy Hacker News Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/activity-hackernews
          secrets: |
            HN_USERNAME
            ACTIVITY_INGEST_TOKEN
        env:
          HN_USERNAME: ${{ secrets.HN_USERNAME }}
          ACTIVITY_INGEST_TOKEN: ${{ secrets.ACTIVITY_INGEST_TOKEN }}

  deploy-steam:
    name: Deploy Steam Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/activity-steam
          secrets: |
            STEAM_API_KEY
            STEAM_USER_ID
            ACTIVITY_INGEST_TOKEN
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_USER_ID: ${{ secrets.STEAM_USER_ID }}
          ACTIVITY_INGEST_TOKEN: ${{ secrets.ACTIVITY_INGEST_TOKEN }}
